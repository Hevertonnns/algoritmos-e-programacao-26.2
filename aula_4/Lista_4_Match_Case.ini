## Exercício 16 – Menu de opções

Peça ao usuário para digitar uma opção:

1 – Olá
2 – Bem-vindo
3 – Python

Mostre a mensagem correspondente à opção escolhida.

Caso a opção não exista, mostre **"Opção inválida"**.

