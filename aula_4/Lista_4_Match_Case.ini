## Exercício 22 – Conversão de temperatura

Peça ao usuário:

* valor da temperatura
* tipo de conversão (`C`, `F`, `K`)

Use `match-case` para escolher a conversão.

Exemplo:

* C → Celsius para Fahrenheit
* F → Fahrenheit para Celsius
* K → Kelvin para Celsius

